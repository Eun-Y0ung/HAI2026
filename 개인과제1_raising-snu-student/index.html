<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울대생 키우기</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="game-root">

<!-- 빨간 플래시 오버레이 -->
<div id="flash-overlay"></div>

<!-- ══════════════════════════════════
     타이틀 화면
══════════════════════════════════ -->
<div id="screen-title" class="screen active">
  <img src="image_asset/오프닝 UI.png" class="screen-bg-img" alt="타이틀 화면">
  <button class="btn-opening btn-pixel" onclick="showPrologue()">서울대 입학하기</button>
</div>

<!-- ══════════════════════════════════
     프롤로그 화면
══════════════════════════════════ -->
<div id="screen-prologue" class="screen">
  <div class="prologue-wrap">
    <p id="prologue-text" class="prologue-text"></p>
    <button id="btn-start" class="btn-pixel hidden" onclick="startChapter(0)">시작하기</button>
  </div>
</div>

<!-- ══════════════════════════════════
     메인 게임 화면
══════════════════════════════════ -->
<div id="screen-game" class="screen">

  <!-- HUD: HP + LIVES만 표시 -->
  <div class="hud">
    <div class="hud-hp">
      <span class="hud-label">HP:</span>
      <div class="hp-track"><div id="hp-fill" class="hp-fill"></div></div>
    </div>
    <div class="hud-lives">
      <span class="hud-label">LIVES:</span>
      <div class="lives-wrap">
        <span class="heart" id="h0">♥</span>
        <span class="heart" id="h1">♥</span>
        <span class="heart" id="h2">♥</span>
      </div>
    </div>
  </div>

  <!-- 중앙: 캐릭터 + 미션 -->
  <div class="game-center">

    <!-- 왼쪽: 캐릭터 패널 -->
    <div class="panel char-panel">
      <div class="panel-header">CHARACTER</div>
      <div class="char-body">

        <!-- 캐릭터 왼쪽: 학년·미션 현황 + 게이지 -->
        <div class="char-left">
          <div class="char-status-box">
            <span id="year-badge" class="char-year-badge">1학년</span>
            <span id="prog-badge" class="char-prog-badge">0 / 5</span>
          </div>
          <div class="gauge-col">
            <div class="gauge-ticks">
              <span>4.0</span>
              <span>3.0</span>
              <span>2.0</span>
              <span>1.0</span>
            </div>
            <div class="gauge-track">
              <div id="gauge-fill" class="gauge-fill"></div>
            </div>
          </div>
          <div class="gauge-label-row">GRADE</div>
        </div>

        <!-- 캐릭터 PNG -->
        <div class="char-png-wrap">
          <img src="image_asset/캐릭터_기본.png?v=2" class="char-png" alt="캐릭터">
        </div>

      </div>
    </div>

    <!-- 오른쪽: 미션 패널 -->
    <div class="panel mission-panel">
      <div class="panel-header">MISSION LIST</div>
      <div id="mission-grid" class="mission-grid"></div>
    </div>

  </div>

  <!-- 방향키 입력 표시 바 -->
  <div class="sel-bar">
    <div id="sel-chips" class="sel-chips"></div>
    <button class="btn-cancel" onclick="cancelSel()">✕</button>
    <span class="sel-hint">방향키로 입력 · ESC 정지</span>
    <span class="sel-deco">✦</span>
  </div>

  <!-- 풍자 팝업 -->
  <div id="satire-popup" class="satire-popup"></div>

  <!-- 이벤트 오버레이 -->
  <div id="modal-event" class="event-overlay hidden">
    <div class="event-card">
      <div class="ev-name-tab">[미션: <span id="ev-name"></span>]</div>
      <div class="ev-content-box">
        <div class="ev-emblem">
          <div class="ev-emblem-ring">
            <span class="ev-emblem-symbol">⚡</span>
          </div>
        </div>
        <div class="ev-timer-badge">
          <span id="ev-timer">5</span>
        </div>
      </div>
      <div class="ev-gauge-section">
        <div class="ev-gauge-track">
          <div id="ev-gauge-fill" class="ev-gauge-fill"></div>
        </div>
        <span id="ev-progress" class="ev-progress">0 / 10</span>
      </div>
      <p class="ev-hint">스페이스바를 빠르게 연타하세요!</p>
    </div>
  </div>

  <!-- 일시정지 오버레이 -->
  <div id="modal-pause" class="pause-overlay hidden">
    <div class="pause-card">
      <h2 class="pause-title">일시정지</h2>
      <button class="btn-pixel" onclick="resumeGame()">계속하기</button>
      <button class="btn-pixel btn-secondary" onclick="restartFromPause()">다시 시작하기</button>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════
     챕터 클리어
══════════════════════════════════ -->
<div id="screen-chapter-clear" class="screen screen-clear-bg">
  <div class="win-dialog">
    <div class="win-titlebar">
      <div class="win-left-icons">
        <span class="win-icon-btn">🔍</span>
        <span class="win-icon-btn">?</span>
      </div>
      <span class="win-title-text">SNU GAME: STUDENT LIFE</span>
      <div class="win-right-ctrls">
        <span class="win-ctrl-btn">_</span>
        <span class="win-ctrl-btn">□</span>
        <span class="win-ctrl-btn">✕</span>
      </div>
    </div>
    <div class="win-body">
      <img src="image_asset/캐릭터_게임성공.png" class="clear-char-png" alt="성공 캐릭터">
      <h2 id="clear-title" class="clear-title">2학년 달성</h2>
      <button id="btn-next-ch" class="btn-win" onclick="nextChapter()">2학년 생활 시작하기</button>
    </div>
    <span class="win-deco">✦</span>
  </div>
</div>

<!-- ══════════════════════════════════
     게임 오버 화면
══════════════════════════════════ -->
<div id="screen-gameover" class="screen screen-gameover">
  <img src="image_asset/실패 UI.png" class="screen-bg-img" alt="게임오버">
  <button class="btn-gameover btn-pixel" onclick="restartGame()">복학하시겠습니까?</button>
</div>

<!-- ══════════════════════════════════
     엔딩 / 졸업 화면
══════════════════════════════════ -->
<div id="screen-ending" class="screen screen-ending">
  <div class="ending-wrap">
    <img src="image_asset/캐릭터_졸업.png" class="ending-char-png" alt="졸업 캐릭터">
    <h2 class="ending-title">졸업을 축하합니다! 🎓</h2>
    <div class="score-box">
      <div class="score-row">
        <span class="score-label">총 달성 미션 수</span>
        <span class="score-val" id="stat-done">-</span>
      </div>
      <div class="score-row">
        <span class="score-label">총 실패 횟수</span>
        <span class="score-val" id="stat-failed">-</span>
      </div>
      <div class="score-row">
        <span class="score-label">이벤트 성공률</span>
        <span class="score-val" id="stat-ev">-</span>
      </div>
      <div class="score-row score-grade-row">
        <span class="score-label">최종 학점</span>
        <span class="score-val score-grade-val" id="stat-grade">-</span>
      </div>
    </div>
    <p id="ending-satire" class="ending-satire"></p>
    <button class="btn-pixel" onclick="restartGame()">다시 입학하기</button>
  </div>
</div>

</div><!-- /#game-root -->

<script src="js/game.js"></script>
</body>
</html>
